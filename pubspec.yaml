name: nextboltvpn
description: NextBolt VPN - Fast, Private & Secure VPN for iOS
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP requests (for API)
  http: ^1.2.1

  # Local storage (for settings)
  shared_preferences: ^2.2.3

  # Open URLs / email / Play Store
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.6
  amneziawg_flutter:
    path: packages/amneziawg_flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false