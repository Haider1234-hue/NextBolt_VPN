name: nextboltvpn
description: NextBolt VPN - Fast, Private & Secure VPN for iOS
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP requests (for API)
  http: ^1.2.1

  # Local storage (for settings)
  shared_preferences: ^2.2.3

  cupertino_icons: ^1.0.6
  wireguard_flutter_plus: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true