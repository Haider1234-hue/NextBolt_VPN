name: amneziawg_flutter
description: >
  Local fork of wireguard_flutter_plus, swapped to use the AmneziaWG
  (org.amnezia.awg) native backend instead of stock WireGuard. Android-only;
  iOS/macOS/Windows/Linux support was dropped from this fork.
version: 1.0.5
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.7'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: orban.group.wireguard_flutter
        pluginClass: WireguardFlutterPlugin
